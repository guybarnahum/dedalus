# Persistent live AirSim RGB stream + ego-state ingestion.
# Requires a running AirSim/Colosseum simulation and the Python AirSim package.
# Frame capture uses one long-running JSONL bridge process instead of spawning
# Python once per frame. Ego capture still uses the per-sample ego bridge.

frame_source: airsim
airsim_bridge_mode: stream_jsonl
airsim_bridge_command: python3 simulation/airsim-stream-frames.py --count 0 --rate-hz 5
ego_provider: airsim
airsim_ego_bridge_command: python3 simulation/airsim-capture-ego.py
detector: scripted
tracker: simple_centroid
identity_resolver: appearance_only
projector: flat_ground
world_model: in_memory
fallback_map_frame_id: map_airsim_stream_ego_0001

airsim_host: 127.0.0.1
airsim_rpc_port: 41451
airsim_vehicle_name: PX4
airsim_camera_name: front_center
