mission:
  name: follow_specific_track_demo

target:
  selector:
    class: person
    track_id: ghost_person_001
    confidence_min: 0.55
    policy: persistent_track
    reacquire_timeout_s: 5.0

behavior:
  type: follow
  target_frame: target_heading_frame
  relative_offset_m:
    x: -8.0
    y: 0.0
    z: 4.0
  max_speed_mps: 2.0
  position_tolerance_m: 1.5
  lost_target_timeout_s: 5.0

completion:
  after_s: 30
  then: go_home_land

fallback:
  on_target_lost: hold_then_go_home
  hold_s: 5.0
