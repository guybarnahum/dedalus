mission:
  name: approach_then_circle_demo

target:
  selector:
    class: vehicle
    confidence_min: 0.6
    policy: nearest

behavior:
  type: sequence
  steps:
    - type: approach
      stop_distance_m: 8.0
      altitude_offset_m: 4.0
      max_speed_mps: 2.0
    - type: circle
      radius_m: 10.0
      altitude_offset_m: 5.0
      angular_speed_deg_s: 10.0
      duration_s: 20.0
      max_speed_mps: 3.0
    - type: go_home_land

completion:
  then: go_home_land

fallback:
  on_target_lost: search_then_go_home
  search_s: 10.0
