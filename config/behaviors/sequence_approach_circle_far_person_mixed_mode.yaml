mission:
  name: sequence_approach_circle_far_person_mixed_mode_demo

target:
  selector:
    class: person
    track_id: ghost_far_person_001
    confidence_min: 0.55
    policy: persistent_track
    reacquire_timeout_s: 5.0

behavior:
  type: sequence
  steps:
    - type: approach
      stop_distance_m: 12.0
      position_tolerance_m: 1.5
      altitude_offset_m: 4.0
      max_speed_mps: 3.0
      max_vertical_speed_mps: 1.0
      yaw_mode: target
      camera_pointing_mode: target
      lost_target_timeout_s: 5.0

    - type: circle
      radius_m: 10.0
      altitude_offset_m: 4.0
      angular_speed_deg_s: 8.0
      direction: clockwise
      max_speed_mps: 3.0
      max_vertical_speed_mps: 1.0
      position_tolerance_m: 1.5
      lost_target_timeout_s: 5.0
      orbit_count: 3.0
      yaw_mode: trajectory
      camera_pointing_mode: target

completion:
  after_s: 240
  then: go_home_land

fallback:
  on_target_lost: search_then_go_home
  search_s: 10.0
