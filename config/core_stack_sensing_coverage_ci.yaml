# CI fixture for obstacle sensing camera coverage config parsing.
frame_source: synthetic
ego_provider: frame_hint
detector: scripted
camera_stabilizer: null
tracker: simple_centroid
identity_resolver: appearance_only
projector: flat_ground
world_model: in_memory
fallback_map_frame_id: map_local_0001

mission_options.obstacle_sensing.cameras.0.name: front_center
mission_options.obstacle_sensing.cameras.0.role: visual_obstacle_detector
mission_options.obstacle_sensing.cameras.0.horizontal_fov_deg: 90
mission_options.obstacle_sensing.cameras.0.vertical_fov_deg: 60
mission_options.obstacle_sensing.cameras.0.near_range_m: 0.5
mission_options.obstacle_sensing.cameras.0.far_range_m: 80
mission_options.obstacle_sensing.cameras.0.min_reliable_range_m: 1
mission_options.obstacle_sensing.cameras.0.max_reliable_range_m: 60
mission_options.obstacle_sensing.cameras.0.body_T_camera_xyz_m: [0.1, 0.0, -0.05]
mission_options.obstacle_sensing.cameras.0.body_T_camera_rpy_deg: [0, 0, 0]
mission_options.obstacle_sensing.cameras.0.pointing_source: camera_pointing_intent

mission_options.obstacle_sensing.cameras.1.name: downward
mission_options.obstacle_sensing.cameras.1.role: landing_area_detector
mission_options.obstacle_sensing.cameras.1.horizontal_fov_rad: 1.2217304763960306
mission_options.obstacle_sensing.cameras.1.vertical_fov_rad: 0.8726646259971648
mission_options.obstacle_sensing.cameras.1.near_range_m: 0.25
mission_options.obstacle_sensing.cameras.1.far_range_m: 40
mission_options.obstacle_sensing.cameras.1.min_reliable_range_m: 0.5
mission_options.obstacle_sensing.cameras.1.max_reliable_range_m: 30
mission_options.obstacle_sensing.cameras.1.body_T_camera_xyz_m: [0.0, 0.0, 0.02]
mission_options.obstacle_sensing.cameras.1.body_T_camera_rpy_deg: [0, 90, 0]
mission_options.obstacle_sensing.cameras.1.pointing_source: configured_fixed
