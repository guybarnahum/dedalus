include: config/world-env/airsim.yaml
include: config/drone/px4_front_center.yaml
include: config/pipeline/visual.yaml
include: config/mission/sequence_far_person.yaml
include: config/output/standard_ppm.yaml

ego_provider: frame_hint
# Use airsim_ground_truth detector (2D bbox + depth_m) routed through the fixed
# FlatGroundProjector (full camera back-projection).  Ghost targets disabled:
# they provide NED positions directly (ground truth not available in real flight).
detector: airsim_ground_truth
projector_require_depth: true
ghost_targets_enabled: false

annotation_output_path: out/sequence_far_person_visual_gt_ego_annotation
