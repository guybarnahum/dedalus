# ── Run: AirSim  ·  circle person  ·  Visual primary + AirSim GT eval ────────
# visual_onnx as slot A (primary → L1/L2); airsim_gt_vd as slot B (GT, logged only).
# Both slots use the same 40×22 block-minimum grid and run_depth_pipeline() path.
# GT-centric metrics logged per frame to profiler JSONL:
#   depth.voxel_precision_ppt  — fraction of ONNX evidence confirmed by GT
#   depth.voxel_recall_ppt     — fraction of GT confirmed by ONNX (SAFETY METRIC)
#   depth.voxel_f1_ppt         — harmonic mean of precision and recall
#   depth.false_positive_count — ONNX-only voxels (phantom obstacles)
#   depth.false_negative_count — GT-only voxels (missed obstacles, safety-critical)
#   depth.scale_ratio          — GT_range / ONNX_range (calibration error)
#   depth.angular_precision_ppt depth.angular_recall_ppt depth.angular_f1_ppt
#   depth.slot_a.fx depth.slot_a.fy depth.slot_b.fx depth.slot_b.fy
#   depth.nn_median_dist_mm    — median nearest-neighbour distance A→B (no threshold)
#
# IMPORTANT: Do NOT use --obstacle-evidence-overlay during A/B depth evaluation.
# The overlay injects ONNX evidence tiles as 3D objects into AirSim, which appear
# in DepthPlanar and cause GT to detect obstacles at ONNX positions → circular
# self-confirmation → artificially inflated recall. Always run without overlay.
#
# Report:
#   python3 tools/mission/ab-depth-report.py out/circle_visual_eval/profile/pipeline_*.jsonl
#   python3 tools/mission/ab-depth-report.py --tsv .../*.jsonl > ab.tsv
#
# Usage:
#   simulation/airsim/run_mission.sh \
#     --config config/runs/airsim_circle_visual_eval.yaml \
#     --output-dir out/circle_visual_eval \
#     --pipeline-timing \
#     --no-obstacle-evidence-overlay

include: config/world-env/airsim.yaml
include: config/drone/px4_front_center_depth.yaml
include: config/pipeline/visual_eval_airsim_gt.yaml
include: config/mission/circle_person.yaml
include: config/output/standard_ppm.yaml

annotation_output_path: out/circle_visual_eval_annotation
