# ── Pipeline: Visual primary + AirSim GT eval (A/B comparison) ────────────────
# Visual pipeline as slot A (primary); AirSim GT depth runs as slot B (eval)
# via the same VD kernel path (airsim_gt_vd) so grid dimensions and projection
# logic are identical — a fair apples-to-apples comparison.
# Ego uses AirSim frame_hint (NOT visual odometry) — this pipeline evaluates
# visual depth detection only; ego accuracy is not the variable under test.
# Agreement metric logged per-frame to profiler JSONL:
#   depth_slot_b.evidence_count     depth.voxel_overlap_ppt
#
# Requires: drone/px4_front_center_depth.yaml (eval slot needs depth frames).

include: config/pipeline/visual.yaml

# Override VO ego from visual.yaml — use AirSim telemetry so the drone flies
# correctly while visual depth detection is evaluated against GT.
ego_provider: frame_hint

# Slot B: GT projected through VD kernels, same 40×22 grid as visual_onnx.
# Grid/filter params inherited from visual_onnx.* keys set by visual.yaml.
depth_eval: airsim_gt_vd
