# ── Pipeline: Visual ego + monocular depth (no AirSim GT) ─────────────────────
# Fully visual sensing — no AirSim ground truth used for ego or depth:
#   ego:   VisualOdometryProvider — FAST-9 + LK optical flow + FoE RANSAC +
#          VL2 metric scale from L2 map, VL3 fallback to frame_hint.
#   depth: DepthAnything V2 Small Metric — ONNX inference on RGB, CUDA accelerated.
#          metric_depth: true → raw ONNX output is calibrated INVERSE DEPTH in 1/m
#          (HIGH=CLOSE).  Engine stores depth_relative = raw directly.
#          Projection: depth_m = scale / depth_relative = 1.0 / raw  (scale=1.0).
#
# Requires:
#   - Build with -DDEDALUS_ENABLE_ONNX_DEPTH=ON (auto when ORT SDK present)
#   - models/depth_anything_v2_metric_vits.onnx  (export with --metric flag)
#       python3 tools/perception/export_depth_anything.py \
#           --output models/depth_anything_v2_metric_vits.onnx
#   - drone/px4_front_center.yaml (no --include-depth needed)
#
# Tip: disable L2 persistence during initial validation to avoid accumulating
# noisy VO evidence in the site map:
#   DEDALUS_L2_NO_PERSIST=1 simulation/airsim/run_mission.sh ...
#
# Override at runtime (verified from config_loader.cpp):
#   DEDALUS_EGO_PROVIDER=frame_hint      — revert ego to AirSim hint
#   DEDALUS_DEPTH=airsim_gt_detector     — revert depth to GT

ego_provider: visual_odometry
depth: visual_onnx
detector: null
camera_stabilizer: null
tracker: simple_centroid
identity_resolver: appearance_only
projector: flat_ground
world_model: in_memory

visual_onnx.model_path: models/depth_anything_v2_metric_vits.onnx
visual_onnx.metric_depth: true
visual_onnx.scale: 1.0
visual_onnx.use_cuda: true
visual_onnx.cuda_arena_limit_bytes: 4294967296
visual_onnx.pixel_stride: 4
visual_onnx.min_depth_m: 0.5
visual_onnx.max_depth_m: 60.0
visual_onnx.voxel_size_m: 1.5
visual_onnx.max_evidence: 256
