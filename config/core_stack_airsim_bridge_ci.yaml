# CI-safe AirSim bridge-provider composition. This exercises
# frame_source=airsim and ego_provider=airsim through fake bridge commands
# without importing AirSim.

frame_source: airsim
airsim_bridge_command: python3 tests/fixtures/airsim_bridge_ci_fake.py
ego_provider: airsim
airsim_ego_bridge_command: python3 tests/fixtures/airsim_ego_bridge_ci_fake.py
detector: scripted
tracker: simple_centroid
identity_resolver: appearance_only
projector: flat_ground
world_model: in_memory
fallback_map_frame_id: map_airsim_bridge_ci_0001

airsim_host: 127.0.0.1
airsim_rpc_port: 41451
airsim_vehicle_name: PX4
airsim_camera_name: front_center
