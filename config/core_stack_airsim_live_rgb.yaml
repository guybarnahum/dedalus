# Live RGB ingestion through the external Python bridge.
# This config uses frame_source=airsim but keeps ego/depth/ground-truth out of
# the run by using no_telemetry, scripted detector, and flat_ground projector.
# It requires a running AirSim/Colosseum simulation and the Python AirSim package.

frame_source: airsim
bridge_command: python3 simulation/airsim/scripts/airsim-capture-frame.py
ego_provider: no_telemetry
detector: scripted
tracker: simple_centroid
identity_resolver: appearance_only
projector: flat_ground
world_model: in_memory
fallback_map_frame_id: map_airsim_live_rgb_0001

source_host: 127.0.0.1
source_rpc_port: 41451
vehicle_name: PX4
vehicle_camera_name: front_center
