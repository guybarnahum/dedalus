# CI-safe source bridge-provider composition. This exercises
# frame_source=airsim and ego_provider=airsim through fake bridge commands
# without importing AirSim.

frame_source: airsim
bridge_command: python3 tests/fixtures/airsim_bridge_ci_fake.py
ego_provider: airsim
ego_bridge_command: python3 tests/fixtures/airsim_ego_bridge_ci_fake.py
detector: scripted
tracker: simple_centroid
identity_resolver: appearance_only
projector: flat_ground
world_model: in_memory
fallback_map_frame_id: map_airsim_bridge_ci_0001

source_host: 127.0.0.1
source_rpc_port: 41451
vehicle_name: PX4
vehicle_camera_name: front_center
