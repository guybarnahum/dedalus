# CI test fixture for config loader contracts (test_core_stack_config_loader).
# Validates object_behavior + ghost trajectory_scenario provider parsing.
# Not a real operational config — use config/runs/ for missions.
frame_source: synthetic_mission
ego_provider: frame_hint
detector: scripted
tracker: simple_centroid
identity_resolver: appearance_only
projector: flat_ground
world_model: in_memory
fallback_map_frame_id: map_local_0001

ghost_targets_enabled: true
ghost_targets_source: trajectory_scenario
ghost_targets_scenario: person_pair_crossing

frame_annotator: ppm_sequence
annotation_output_path: out/object_behavior_annotation
annotation_output_fps: 5

mission_controller: object_behavior
mission_tick_hz: 10
flight_command_sink: disabled
mission_options.behavior_spec_path: config/behaviors/follow_specific_track.yaml
mission_options.object_behavior_hold_velocity_mps: 0.0
mission_options.object_behavior_completion_after_s: 1.0
mission_options.flight_safe_height_m: 2
mission_options.flight_home_policy: initial_ego_pose
mission_options.flight_arm_retry_interval_s: 0.2
mission_options.flight_arm_timeout_s: 2.0
mission_options.flight_land_timeout_s: 14.0
