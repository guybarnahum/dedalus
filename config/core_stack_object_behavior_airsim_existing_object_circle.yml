# AirSim existing-object circle behavior run config.
#
# This config reuses the validated explicit existing-object binding and switches
# the behavior spec from follow to circle/orbit behavior.
#
# Default behavior target:
#   source_track_id: ghost_person_001
#   airsim_object_name: BRPlayer_01_96
#   class: person

frame_source: airsim
ego_provider: frame_hint
detector: scripted
camera_stabilizer: null
tracker: simple_centroid
identity_resolver: appearance_only
projector: flat_ground
world_model: in_memory
occupancy_source: airsim_ground_truth
frame_annotator: ppm_sequence
annotation_output_path: out/object_behavior_airsim_existing_object_circle_annotation
annotation_output_fps: 5
fallback_map_frame_id: map_airsim_mission_0001

source_host: 127.0.0.1
source_rpc_port: 41451
vehicle_name: PX4
vehicle_camera_name: front_center
bridge_transport: pipe
bridge_mode: stream_binary_ego
bridge_command: python3 simulation/airsim/scripts/airsim-stream-frames-binary.py --include-ego --include-depth --include-surface-normals --depth-stride 16 --rate-hz 5 --mavlink-armed-endpoints udpin:127.0.0.1:14540

# AirSim GT visual-emulation requires explicit camera sensing coverage.
# The obstacle evidence path clips global GT objects against this camera volume.
# Camera pitch is updated from camera_pointing_intent during object behavior.
mission_options.obstacle_sensing.cameras.0.name: front_center
mission_options.obstacle_sensing.cameras.0.role: visual_obstacle_detector
mission_options.obstacle_sensing.cameras.0.horizontal_fov_deg: 90
mission_options.obstacle_sensing.cameras.0.vertical_fov_deg: 60
mission_options.obstacle_sensing.cameras.0.near_range_m: 0.5
mission_options.obstacle_sensing.cameras.0.far_range_m: 80
mission_options.obstacle_sensing.cameras.0.min_reliable_range_m: 1
mission_options.obstacle_sensing.cameras.0.max_reliable_range_m: 60
mission_options.obstacle_sensing.cameras.0.body_T_camera_xyz_m: [0, 0, 0]
mission_options.obstacle_sensing.cameras.0.body_T_camera_rpy_deg: [0, 0, 0]
mission_options.obstacle_sensing.cameras.0.pointing_source: camera_pointing_intent

ghost_targets_enabled: true
ghost_targets_source: airsim_objects
ghost_targets_airsim.objects.0.source_track_id: ghost_person_001
ghost_targets_airsim.objects.0.airsim_object_name: BRPlayer_01_96
ghost_targets_airsim.objects.0.class: person
ghost_targets_airsim.objects.0.confidence: 0.82
ghost_targets_airsim.objects.0.size_m: [0.6, 0.6, 1.8]

# AirSim object-pattern bindings emulate the geometry-first obstacle evidence
# a future visual obstacle detector should produce. Semantic labels are best-effort
# type hints for validation/comparison, not a safety requirement.
#
# AirSim's simListSceneObjects matcher behaves like a regex matcher, so these
# are regex-style scene-object expressions, not shell globs.
ghost_targets_airsim.patterns.0.source_track_prefix: gt_tree
ghost_targets_airsim.patterns.0.airsim_object_pattern: Tree.*
ghost_targets_airsim.patterns.0.class: tree
ghost_targets_airsim.patterns.0.confidence: 0.95
ghost_targets_airsim.patterns.0.size_m: [1.5, 1.5, 6.0]
ghost_targets_airsim.patterns.0.max_matches: 32

ghost_targets_airsim.patterns.1.source_track_prefix: gt_wall
ghost_targets_airsim.patterns.1.airsim_object_pattern: Wall.*
ghost_targets_airsim.patterns.1.class: wall
ghost_targets_airsim.patterns.1.confidence: 0.90
ghost_targets_airsim.patterns.1.size_m: [4.0, 0.5, 2.5]
ghost_targets_airsim.patterns.1.max_matches: 32

ghost_targets_airsim.patterns.2.source_track_prefix: gt_fence
ghost_targets_airsim.patterns.2.airsim_object_pattern: Fence.*
ghost_targets_airsim.patterns.2.class: fence
ghost_targets_airsim.patterns.2.confidence: 0.85
ghost_targets_airsim.patterns.2.size_m: [4.0, 0.25, 1.8]
ghost_targets_airsim.patterns.2.max_matches: 32

ghost_targets_airsim.patterns.3.source_track_prefix: gt_cable
ghost_targets_airsim.patterns.3.airsim_object_pattern: Power_Line.*
ghost_targets_airsim.patterns.3.class: cable
ghost_targets_airsim.patterns.3.confidence: 0.80
ghost_targets_airsim.patterns.3.size_m: [0.15, 0.15, 4.0]
ghost_targets_airsim.patterns.3.max_matches: 32

ghost_targets_airsim.patterns.4.source_track_prefix: gt_rock
ghost_targets_airsim.patterns.4.airsim_object_pattern: .*Rock.*
ghost_targets_airsim.patterns.4.class: obstacle
ghost_targets_airsim.patterns.4.confidence: 0.80
ghost_targets_airsim.patterns.4.size_m: [1.5, 1.5, 1.0]
ghost_targets_airsim.patterns.4.max_matches: 32

mission_controller: object_behavior
mission_tick_hz: 10
flight_command_sink: px4_bridge

mission_options.behavior_spec_path: config/behaviors/circle_existing_object_person.yaml
mission_options.object_behavior_hold_velocity_mps: 0.0
mission_options.object_behavior_altitude_policy: safe_height_floor
mission_options.object_behavior_zero_target_velocity: true

# Circle owns the orbit geometry; follow observation geometry stays disabled.
mission_options.object_behavior_follow_observation_geometry_enabled: false
mission_options.object_behavior_follow_arrival_slow_radius_m: 10.0
mission_options.object_behavior_follow_arrival_hold_radius_m: 3.0
mission_options.object_behavior_follow_arrival_kp: 0.30

# Target-facing yaw points the drone/front camera at the selected object while
# the velocity controller still flies tangent/radial orbit commands.
mission_options.object_behavior_yaw_mode: target
mission_options.object_behavior_yaw_min_speed_mps: 0.35
mission_options.object_behavior_yaw_hold_last_when_unstable: true

# Target-facing camera pitch is emitted by C++ as camera_pointing_intent events.
# The AirSim camera-pointing bridge consumes the intent and applies the same
# pitch to front_center (Dedalus capture) and 0 (AirSim operator FPV/F view).
mission_options.object_behavior_vertical_stare_mode: gimbal
mission_options.object_behavior_vertical_stare_warn_if_unavailable: true
mission_options.object_behavior_camera_pointing_cameras: front_center,0
mission_options.object_behavior_camera_pitch_min_deg: -80
mission_options.object_behavior_camera_pitch_max_deg: 35
mission_options.object_behavior_camera_pitch_sign: -1
mission_options.object_behavior_camera_pitch_offset_deg: 0
mission_options.object_behavior_camera_pointing_prepare_mode: neutral
mission_options.object_behavior_camera_pointing_takeoff_mode: neutral
mission_options.object_behavior_camera_pointing_go_home_mode: home
mission_options.object_behavior_camera_pointing_land_mode: landing_area
mission_options.object_behavior_camera_pointing_complete_mode: neutral

# Emit behavior_debug into mission_events.jsonl every N ExecuteMission ticks.
mission_options.object_behavior_debug_every_n_ticks: 10
mission_options.object_behavior_debug_level: 2
mission_options.object_behavior_completion_after_s: 180.0

mission_options.flight_prepare_session_command: python3 simulation/airsim/scripts/airsim-prepare-session.py --host 127.0.0.1 --rpc-port 41451 --vehicle-name PX4 --mavlink-endpoints udpin:127.0.0.1:14550,udpin:127.0.0.1:14540,udpin:127.0.0.1:14600
mission_options.flight_safe_height_m: 16
mission_options.flight_px4_command_bridge: python3 tools/px4/px4-command-bridge.py --mavlink-endpoints udpin:127.0.0.1:14550 --px4-tmux-target dedalus-sim:px4 --safe-height 16 --safe-height-timeout-s 60
mission_options.flight_home_policy: initial_ego_pose

mission_options.flight_arm_retry_interval_s: 4.0
mission_options.flight_arm_timeout_s: 30.0
mission_options.flight_arm_dispatch_fallback_s: 2.0
mission_options.flight_takeoff_retry_interval_s: 4.0
mission_options.flight_land_retry_interval_s: 4.0
mission_options.flight_land_timeout_s: 90.0
mission_options.flight_disarm_retry_interval_s: 4.0
mission_options.flight_disarm_timeout_s: 30.0
