# Example AirSim provider composition. This is not used by CI because some
# integration providers are still explicit unavailable stubs.
# Source connection and bridge settings use generic keys so the provider
# composition contract remains source-neutral.

frame_source: airsim
ego_provider: airsim
detector: airsim_ground_truth
tracker: simple_centroid
identity_resolver: appearance_only
projector: airsim_depth
world_model: in_memory
fallback_map_frame_id: map_airsim_0001

source_host: 127.0.0.1
source_rpc_port: 41451
vehicle_name: PX4
vehicle_camera_name: front_center
