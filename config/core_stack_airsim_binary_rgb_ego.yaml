# Persistent live RGB stream + ego-state ingestion using binary framed RGB.
# Requires a running AirSim/Colosseum simulation and the Python AirSim package.
# Frame capture uses one long-running binary bridge process. Ego capture still
# uses the per-sample ego bridge.

frame_source: airsim
bridge_mode: stream_binary
bridge_command: python3 simulation/airsim-stream-frames-binary.py --count 0 --rate-hz 5
ego_provider: airsim
ego_bridge_command: python3 simulation/airsim-capture-ego.py
detector: scripted
tracker: simple_centroid
identity_resolver: appearance_only
projector: flat_ground
world_model: in_memory
fallback_map_frame_id: map_airsim_binary_ego_0001

source_host: 127.0.0.1
source_rpc_port: 41451
vehicle_name: PX4
vehicle_camera_name: front_center
