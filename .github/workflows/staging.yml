name: Staging

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'manual validation'

jobs:
  build-and-validate:
    name: Staging build and smoke validate (${{ github.ref_name }})
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cmake
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake g++

      - name: Configure
        run: |
          cmake -S . -B build-staging \
            -DDEDALUS_BUILD_APPS=ON \
            -DDEDALUS_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build-staging -j$(nproc)

      - name: Run fast CTest subset
        run: ctest --test-dir build-staging --output-on-failure -LE 'synthetic|scenario'

      - name: Run core stack smoke validation
        run: bash scripts/ci/validate-core-stack-smoke.sh
        env:
          BUILD_DIR: build-staging
          SNAPSHOT_PATH: /tmp/world_snapshot_staging.json
          SUMMARY_TITLE: Staging Validation Summary
          BUILD_RUN_LABEL: Build & run

      - name: Check whitespace
        run: git diff --check

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v6
        with:
          name: world-snapshot-staging
          path: /tmp/world_snapshot_staging.json
