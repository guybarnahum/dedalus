name: Staging

on:
  push:
    branches:
      - staging

jobs:
  build-and-validate:
    name: Staging build and smoke validate
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cmake
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake g++

      - name: Configure
        run: |
          cmake -S . -B build-staging \
            -DDEDALUS_BUILD_APPS=ON

      - name: Build
        run: cmake --build build-staging -j$(nproc)

      - name: Run dedalus_core_stack
        run: ./build-staging/apps/dedalus_core_stack > /tmp/world_snapshot_staging.json

      - name: Validate JSON
        run: python3 -m json.tool /tmp/world_snapshot_staging.json >/dev/null

      - name: Check required fields
        run: |
          grep -q '"active_map_frame_id": "map_local_0001"' /tmp/world_snapshot_staging.json
          grep -q '"class": "person"' /tmp/world_snapshot_staging.json
          grep -q '"type": "car"' /tmp/world_snapshot_staging.json

      - name: Check whitespace
        run: git diff --check

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: world-snapshot-staging
          path: /tmp/world_snapshot_staging.json
