name: Production

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'manual validation'

jobs:
  build-and-validate:
    name: Production release build and smoke validate
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cmake
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake g++

      - name: Show release tag
        run: echo "Building release ${{ github.ref_name }}"

      - name: Configure (Release)
        run: |
          cmake -S . -B build-prod \
            -DDEDALUS_BUILD_APPS=ON \
            -DDEDALUS_BUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-prod -j$(nproc)

      - name: Run unit tests
        run: ctest --test-dir build-prod --output-on-failure

      - name: Run core stack smoke validation
        run: bash scripts/ci/validate-core-stack-smoke.sh
        env:
          BUILD_DIR: build-prod
          SNAPSHOT_PATH: /tmp/world_snapshot_prod.json
          SUMMARY_TITLE: Production Validation Summary — ${{ github.ref_name }}
          BUILD_RUN_LABEL: Build & run (Release)

      - name: Check whitespace
        run: git diff --check

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v6
        with:
          name: world-snapshot-prod
          path: /tmp/world_snapshot_prod.json
